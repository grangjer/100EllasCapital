    <header>

            <nav>
                <ul>
                    <li><a href="about.html" class="nav-link">ABOUT</a></li>

            </nav>
        </div>
    </header>

    <section class="contact-section">
        <div class="container">
            <h2 class="section-title">CONTACT US</h2>
            
            <form id="contact-form" action="https://formspree.io/f/xzdoeyvg" method="post">
                <div class="form-group">
                    <label for="name">Name:<span class="required">(Required)</span></label>
                    <input type="text" id="name" name="name" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:<span class="required">(Required)</span></label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
    
                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number">
                </div>
        
                <div class="form-group">
                    <label for="message">Message:<span class="required">(Required)</span></label>
                    <textarea id="message" name="message" rows="8" placeholder="Message" required></textarea>
                </div>
        
                <button class="btn" type="submit">Submit</button>
            </form>
    
            <div id="thanks-message" style="display: none; text-align: center; padding: 40px 0;">
                <h2 style="font-family: inherit;">THANK YOU</h2>
                <p>Your inquiry has been sent. we will be in touch shortly.</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <img src="9.png">

        </div>
